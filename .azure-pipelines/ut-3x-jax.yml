trigger: none

pr:
  autoCancel: true
  drafts: false
  branches:
    include:
      - master
  paths:
    include:
      - neural_compressor/common
      - neural_compressor/jax
      - test/jax
      - test/common
      - setup.py
      - requirements_jax.txt
      - .azure-pipelines/scripts/ut/run_3x_jax.sh
      - .azure-pipelines/template/docker-template.yml
      - .azure-pipelines/scripts/ut/coverage.3x_jax

pool: ICX-16C

variables:
  IMAGE_NAME: "neural-compressor"
  IMAGE_TAG: "py312"
  UPLOAD_PATH: $(Build.SourcesDirectory)/log_dir
  DOWNLOAD_PATH: $(Build.SourcesDirectory)/log_dir
  ARTIFACT_NAME: "UT_coverage_report_3x_jax"
  REPO: $(Build.Repository.Uri)

stages:
  - stage: JAX
    displayName: Unit Test 3x JAX
    dependsOn: []
    jobs:
      - job:
        displayName: Unit Test 3x JAX
        steps:
          - template: template/ut-template.yml
            parameters:
              dockerConfigName: "commonDockerConfig"
              utScriptFileName: "run_3x_jax"
              uploadPath: $(UPLOAD_PATH)
              utArtifact: "ut_3x"
              utContainerName: "INCUnitTest$(NODE_LABEL)"

  - stage: JAX_baseline
    displayName: Unit Test 3x JAX baseline
    dependsOn: []
    jobs:
      - job:
        displayName: Unit Test 3x JAX baseline
        continueOnError: true
        steps:
          - template: template/ut-template.yml
            parameters:
              dockerConfigName: "gitCloneDockerConfig"
              utScriptFileName: "run_3x_jax"
              uploadPath: $(UPLOAD_PATH)
              utArtifact: "ut_3x_baseline"
              repo: $(REPO)
              utContainerName: "INCUnitTest$(NODE_LABEL)"

  - stage: Coverage
    displayName: "Coverage Compare"
    pool:
      vmImage: "ubuntu-latest"
    dependsOn: [JAX, JAX_baseline]
    jobs:
      - job: CollectDatafiles
        steps:
          - script: |
              if [[ ! $(docker images | grep -i ${IMAGE_NAME}:${IMAGE_TAG}) ]]; then
                docker build --build-arg USER_ID=$(id -u) --build-arg GROUP_ID=$(id -g) \
                  -f ${BUILD_SOURCESDIRECTORY}/.azure-pipelines/docker/Dockerfile.devel -t ${IMAGE_NAME}:${IMAGE_TAG} .
              fi
              docker images | grep -i ${IMAGE_NAME}
              if [[ $? -ne 0 ]]; then
                echo "NO Such Repo"
                exit 1
              fi
            displayName: "Build develop docker image"

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact:
              patterns: '*_coverage/.coverage'
              path: $(DOWNLOAD_PATH)

          - script: |
              echo "--- create container ---"
              docker run -d -it --name="collectLogs" -v ${BUILD_SOURCESDIRECTORY}:/neural-compressor  ${IMAGE_NAME}:${IMAGE_TAG} /bin/bash
              echo "--- docker ps ---"
              docker ps
              echo "--- collect logs ---"
              docker exec collectLogs /bin/bash  +x -c "cd /neural-compressor/.azure-pipelines/scripts \
              && bash install_nc.sh 3x_jax \
              && bash ut/collect_log_3x.sh 3x_jax"
            displayName: "Collect UT Coverage"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: $(UPLOAD_PATH)
              artifact: $(ARTIFACT_NAME)
              publishLocation: 'pipeline'
